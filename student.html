<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portal Siswa MANTUL – Pantau progres, pencapaian, dan riwayat belajarmu." />
  <title>Portal Siswa | MANTUL</title>

  <link rel="stylesheet" href="design-system.css" />
  <link rel="stylesheet" href="components.css" />
  <link rel="stylesheet" href="animations.css" />

  <style>
    body { background: var(--surface); }

    /* ── HEADER PROFILE ── */
    .profile-header {
      background: linear-gradient(135deg, var(--primary), var(--primary-700));
      padding: var(--space-6) var(--space-5) var(--space-8);
      border-bottom-left-radius: var(--radius-2xl);
      border-bottom-right-radius: var(--radius-2xl);
      color: white; text-align: center; position: relative;
    }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: white; border: 4px solid var(--primary-200);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; margin: 0 auto var(--space-3);
      box-shadow: var(--shadow-md);
    }
    .profile-name { font-size: var(--font-size-xl); font-weight: 800; margin-bottom: 2px; }
    .profile-title { font-size: var(--font-size-sm); color: rgba(255,255,255,.8); font-weight: 600; }
    
    /* ── OVERVIEW STATS (Floating Card) ── */
    .stats-card {
      background: white; border-radius: var(--radius-xl);
      padding: var(--space-5); margin: -40px var(--space-4) var(--space-5);
      box-shadow: var(--shadow-md); display: flex; justify-content: space-around;
      border: 1px solid var(--border); position: relative; z-index: 2;
    }
    .stat-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .stat-val { font-size: 1.5rem; font-weight: 900; color: var(--text-main); }
    .stat-lbl { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); }
    .stat-div { width: 1px; background: var(--border-2); }

    /* ── SECTION TITLE ── */
    .sec-title {
      font-size: var(--font-size-lg); font-weight: 800; color: var(--text-main);
      margin: var(--space-5) 0 var(--space-4); display: flex; align-items: center; gap: 8px;
    }

    /* ── BADGES GRID ── */
    .badges-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3);
    }
    .badge-item {
      background: white; border-radius: var(--radius-lg); padding: var(--space-3) 4px;
      display: flex; flex-direction: column; align-items: center; gap: var(--space-2);
      border: 1px solid var(--border); text-align: center;
      transition: all var(--transition-base);
    }
    .badge-icon {
      width: 48px; height: 48px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 1.5rem;
      background: var(--surface-2); color: var(--text-faint); filter: grayscale(1); opacity: 0.5;
    }
    .badge-name { font-size: 10px; font-weight: 700; color: var(--text-muted); line-height: 1.2; }
    
    .badge-item.unlocked { border-color: var(--accent); background: var(--accent-50); }
    .badge-item.unlocked .badge-icon { background: white; filter: grayscale(0); opacity: 1; box-shadow: var(--shadow-sm); }
    .badge-item.unlocked .badge-name { color: var(--accent-700); }

    /* ── PROGRESS LIST ── */
    .prog-list { display: flex; flex-direction: column; gap: var(--space-3); }
    .prog-item {
      background: white; border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: var(--space-4); display: flex; flex-direction: column; gap: 8px;
    }
    .prog-head { display: flex; justify-content: space-between; align-items: center; }
    .prog-title { font-size: var(--font-size-sm); font-weight: 700; color: var(--text-main); }
    .prog-pct { font-size: var(--font-size-xs); font-weight: 800; color: var(--primary); }

    /* ── CHALLENGES ── */
    .challenge-card {
      background: linear-gradient(135deg, var(--warm-100), var(--warm-50));
      border: 1px dashed var(--warm-400); border-radius: var(--radius-lg);
      padding: var(--space-4); display: flex; align-items: center; gap: var(--space-3);
      margin-bottom: var(--space-3);
    }
    .challenge-icon { font-size: 1.8rem; }
    .challenge-text { flex: 1; }
    .challenge-title { font-size: var(--font-size-sm); font-weight: 700; color: var(--warm-800); margin-bottom: 2px; }
    .challenge-desc { font-size: var(--font-size-xs); color: var(--warm-700); }

  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════════════════
       NAVBAR (Minimal)
       ══════════════════════════════════════════════════════ -->
  <nav class="navbar" style="background:transparent;border:none;position:absolute;width:100%;z-index:10;" aria-label="Navigasi halaman">
    <div class="container" style="justify-content:flex-start;">
      <a href="index.html" class="btn-back" style="color:white;background:rgba(0,0,0,.15);border:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Beranda
      </a>
    </div>
  </nav>

  <!-- ══════════════════════════════════════════════════════
       HEADER PROFILE
       ══════════════════════════════════════════════════════ -->
  <div class="profile-header anim-fade-in-up">
    <div class="profile-avatar">🎓</div>
    <h1 class="profile-name">Siswa Paket C</h1>
    <p class="profile-title" id="user-title">Pembelajar Pemula</p>
  </div>

  <div class="container" style="padding-bottom:90px;">
    
    <!-- STATS OVERVIEW -->
    <div class="stats-card anim-fade-in-up delay-100">
      <div class="stat-item">
        <span class="stat-val" id="stat-xp">0</span>
        <span class="stat-lbl">Total XP ⭐</span>
      </div>
      <div class="stat-div"></div>
      <div class="stat-item">
        <span class="stat-val" id="stat-avg">0%</span>
        <span class="stat-lbl">Rata-rata 📈</span>
      </div>
      <div class="stat-div"></div>
      <div class="stat-item">
        <span class="stat-val" id="stat-badges">0</span>
        <span class="stat-lbl">Lencana 🏅</span>
      </div>
    </div>

    <!-- CHALLENGES (Motivation) -->
    <h2 class="sec-title anim-fade-in-up delay-200">🎯 Tantangan Harian</h2>
    <div id="challenges-area" class="anim-fade-in-up delay-200">
      <!-- Injected by JS -->
    </div>

    <!-- BADGES COLLECTION -->
    <h2 class="sec-title anim-fade-in-up delay-300">🏅 Koleksi Lencana</h2>
    <div class="badges-grid anim-fade-in-up delay-300" id="badges-grid">
      <!-- Injected by JS -->
    </div>

    <!-- DETAILED PROGRESS -->
    <h2 class="sec-title anim-fade-in-up delay-400">📊 Progres Topik</h2>
    <div class="prog-list anim-fade-in-up delay-400" id="prog-list">
      <!-- Injected by JS -->
    </div>

  </div>

  <script src="app.js"></script>
  <script>
  'use strict';

  const StudentPortal = {
    state: {
      units: [
        { id:1, title: 'Unit 1: Vocabulary', progress:0, icon: '📖' },
        { id:2, title: 'Unit 2: Speaking', progress:0, icon: '🎙️' },
        { id:3, title: 'Unit 3: Reading', progress:0, icon: '👀' },
        { id:4, title: 'Final Test', progress:0, icon: '🎯' }
      ],
      grammarDone: false,
      xp: 0,
      badges: []
    },

    BADGE_DEF: [
      { id:'b_vocab', title:'Penguasa Kata', icon:'📚', condition: (s) => s.units[0].progress >= 100 },
      { id:'b_speak', title:'Berani Bicara', icon:'🗣️', condition: (s) => s.units[1].progress >= 100 },
      { id:'b_read',  title:'Mata Elang',    icon:'👓', condition: (s) => s.units[2].progress >= 100 },
      { id:'b_gram',  title:'Ahli Pola',     icon:'🧩', condition: (s) => s.grammarDone },
      { id:'b_final', title:'Lulusan Hebat', icon:'🎓', condition: (s) => s.units[3].progress >= 60 },
      { id:'b_xp',    title:'Bintang Rajin', icon:'🌟', condition: (s) => s.xp > 500 }
    ],

    init(){
      this.loadData();
      this.render();
    },

    loadData(){
      // Load Main Units
      try {
        const rawState = localStorage.getItem('emodul_state');
        if(rawState){
          const s = JSON.parse(rawState);
          if(s.units) {
            s.units.forEach(su => {
              const u = this.state.units.find(x => x.id === su.id);
              if(u) u.progress = su.progress || 0;
            });
          }
        }
      } catch(e){}

      // Load Grammar (Material) progress
      try {
        const rawGram = localStorage.getItem('emodul_grammar_present_prog');
        if(rawGram){
          const d = JSON.parse(rawGram);
          if(d && d.every(Boolean)) this.state.grammarDone = true;
        }
      } catch(e){}

      // Load XP (sum from all keys)
      const getXP = (k) => parseInt(localStorage.getItem(k)||'0', 10)||0;
      this.state.xp = getXP('emodul_vocab_xp_session') + 
                      getXP('emodul_speak_xp') + 
                      getXP('emodul_read_xp') + 
                      getXP('emodul_final_xp') +
                      (this.state.grammarDone ? 100 : 0); // simple mock for grammar XP

      // Calculate unlocked badges
      this.state.badges = this.BADGE_DEF.map(b => ({
        ...b,
        unlocked: b.condition(this.state)
      }));
    },

    render(){
      this.renderStats();
      this.renderChallenges();
      this.renderBadges();
      this.renderProgress();
    },

    renderStats(){
      // Calculate Average % (only based on units 1-3, final test is separate)
      let sum = 0;
      for(let i=0; i<3; i++) sum += this.state.units[i].progress;
      const avg = Math.round(sum / 3);
      
      const badgeCount = this.state.badges.filter(b=>b.unlocked).length;

      document.getElementById('stat-xp').textContent = this.state.xp;
      document.getElementById('stat-avg').textContent = `${avg}%`;
      document.getElementById('stat-badges').textContent = badgeCount;

      // Update User Title
      const titleEl = document.getElementById('user-title');
      if(badgeCount >= 5) titleEl.textContent = '🏅 Sang Juara';
      else if(badgeCount >= 3) titleEl.textContent = '🔥 Pembelajar Giat';
      else if(this.state.xp > 200) titleEl.textContent = '🌟 Semakin Berani';
      else titleEl.textContent = '🌱 Pembelajar Pemula';
    },

    renderChallenges(){
      const area = document.getElementById('challenges-area');
      // Simple logic to suggest next step
      let challHtml = '';

      if(this.state.units[0].progress < 100){
        challHtml = `
          <div class="challenge-card">
            <div class="challenge-icon">📖</div>
            <div class="challenge-text">
              <h3 class="challenge-title">Tuntaskan Unit Vocabulary</h3>
              <p class="challenge-desc">Dapatkan lencana Penguasa Kata dengan menyelesaikan Unit 1.</p>
            </div>
            <a href="unit1-vocabulary.html" class="btn btn-sm btn-accent">Gas!</a>
          </div>`;
      } else if(this.state.units[1].progress < 100) {
        challHtml = `
          <div class="challenge-card">
            <div class="challenge-icon">🎙️</div>
            <div class="challenge-text">
              <h3 class="challenge-title">Latih Pronunciation Anda</h3>
              <p class="challenge-desc">Selesaikan Unit 2 Speaking untuk membuka lencana Berani Bicara.</p>
            </div>
            <a href="unit2-speaking.html" class="btn btn-sm btn-accent">Lanjut</a>
          </div>`;
      } else if(this.state.units[3].progress < 60) {
        challHtml = `
          <div class="challenge-card">
            <div class="challenge-icon">🎯</div>
            <div class="challenge-text">
              <h3 class="challenge-title">Waktunya Ujian!</h3>
              <p class="challenge-desc">Anda sudah siap. Ikuti Final Test dan raih kelulusan.</p>
            </div>
            <a href="final-test.html" class="btn btn-sm btn-primary">Mulai</a>
          </div>`;
      } else {
        challHtml = `
          <div class="challenge-card" style="background:var(--primary-50);border-color:var(--primary-200);">
            <div class="challenge-icon">🎉</div>
            <div class="challenge-text">
              <h3 class="challenge-title" style="color:var(--primary-800);">Luar Biasa!</h3>
              <p class="challenge-desc" style="color:var(--primary-700);">Anda telah menguasai semua materi.</p>
            </div>
          </div>`;
      }

      area.innerHTML = challHtml;
    },

    renderBadges(){
      const grid = document.getElementById('badges-grid');
      let html = '';
      this.state.badges.forEach(b => {
        html += `
          <div class="badge-item ${b.unlocked ? 'unlocked' : ''}">
            <div class="badge-icon">${b.icon}</div>
            <div class="badge-name">${b.title}</div>
          </div>
        `;
      });
      grid.innerHTML = html;
    },

    renderProgress(){
      const list = document.getElementById('prog-list');
      let html = '';
      this.state.units.forEach(u => {
        const isFull = u.progress >= 100;
        const color = isFull ? 'var(--accent)' : 'var(--primary)';
        html += `
          <div class="prog-item">
            <div class="prog-head">
              <span class="prog-title">${u.icon} ${u.title}</span>
              <span class="prog-pct" style="color:${color}">${u.progress}%</span>
            </div>
            <div class="progress-bar-track progress-bar-track--thin">
              <div class="progress-bar-fill" style="width:${u.progress}%; background:${color};"></div>
            </div>
          </div>
        `;
      });

      // Add Grammar
      const gramColor = this.state.grammarDone ? 'var(--accent)' : 'var(--border-2)';
      html += `
        <div class="prog-item">
          <div class="prog-head">
            <span class="prog-title">🧩 Tata Bahasa (Penunjang)</span>
            <span class="prog-pct" style="color:${this.state.grammarDone ? 'var(--accent)' : 'var(--text-faint)'}">
              ${this.state.grammarDone ? 'Selesai' : 'Belum'}
            </span>
          </div>
          <div class="progress-bar-track progress-bar-track--thin">
            <div class="progress-bar-fill" style="width:${this.state.grammarDone ? 100 : 0}%; background:${gramColor};"></div>
          </div>
        </div>
      `;

      list.innerHTML = html;
    }
  };

  document.addEventListener('DOMContentLoaded', () => StudentPortal.init());

  </script>
</body>
</html>
