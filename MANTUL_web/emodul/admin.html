<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dashboard Admin PKBM – Kelola modul, akses laporan, dan pantau sistem E-Modul." />
  <title>Dashboard Admin | MANTUL – PKBM Tunas Mandiri</title>

  <link rel="stylesheet" href="css/design-system.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />

  <style>
    body { background: var(--surface); }

    /* ── HEADER ── */
    .admin-header {
      background: linear-gradient(135deg, #1E3A8A, #3B82F6);
      padding: var(--space-5) var(--space-5) var(--space-6);
      border-bottom-left-radius: var(--radius-2xl);
      border-bottom-right-radius: var(--radius-2xl);
      color: white; position: relative;
    }
    .admin-title { font-size: var(--font-size-xl); font-weight: 800; margin-bottom: 2px; }
    .admin-subtitle { font-size: var(--font-size-sm); color: rgba(255,255,255,.8); font-weight: 600; }
    
    /* ── STATS GRID ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3);
      margin: -25px var(--space-4) var(--space-5); position: relative; z-index: 2;
    }
    .stat-card {
      background: white; border-radius: var(--radius-xl); padding: var(--space-3);
      box-shadow: var(--shadow-sm); border: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center;
    }
    .stat-card-val { font-size: 1.5rem; font-weight: 900; color: var(--text-main); line-height: 1; }
    .stat-card-lbl { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); }

    /* ── SECTION TITLE ── */
    .sec-title {
      font-size: var(--font-size-lg); font-weight: 800; color: var(--text-main);
      margin: var(--space-5) 0 var(--space-3); display: flex; align-items: center; justify-content: space-between;
    }

    /* ── MODULE CARDS ── */
    .mod-grid { display: grid; grid-template-columns: 1fr; gap: var(--space-3); }
    .mod-card {
      background: white; border-radius: var(--radius-lg); padding: var(--space-4);
      border: 1px solid var(--border); display: flex; align-items: center; gap: var(--space-3);
    }
    .mod-icon {
      width: 48px; height: 48px; border-radius: 12px; background: var(--surface-2);
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0;
    }
    .mod-info { flex: 1; }
    .mod-title { font-size: var(--font-size-sm); font-weight: 800; color: var(--text-main); }
    .mod-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    
    /* Toggle Switch */
    .toggle-switch {
      position: relative; display: inline-block; width: 40px; height: 22px;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--border-2); transition: .4s; border-radius: 22px;
    }
    .slider:before {
      position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
      background-color: white; transition: .4s; border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(18px); }

    /* ── SYSTEM REPORT (Mock Line Chart via SVG) ── */
    .report-card {
      background: white; border-radius: var(--radius-xl); padding: var(--space-5);
      border: 1px solid var(--border); margin-bottom: var(--space-5);
    }
    .chart-container {
      width: 100%; height: 120px; position: relative; margin-top: var(--space-3);
    }
    .chart-svg { width: 100%; height: 100%; overflow: visible; }
    .chart-line { fill: none; stroke: #3B82F6; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .chart-area { fill: rgba(59,130,246,0.1); }
    .chart-point { fill: white; stroke: #3B82F6; stroke-width: 2; }
    .chart-labels {
      display: flex; justify-content: space-between; margin-top: 8px;
      font-size: 10px; color: var(--text-faint); font-weight: 700;
    }

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" style="background:transparent;border:none;position:absolute;width:100%;z-index:10;" aria-label="Navigasi halaman">
    <div class="container" style="justify-content:flex-start;">
      <a href="index.html" class="btn-back" style="color:white;background:rgba(0,0,0,.15);border:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Beranda
      </a>
    </div>
  </nav>

  <!-- HEADER -->
  <div class="admin-header anim-fade-in-up">
    <div style="margin-top:var(--space-5);">
      <h1 class="admin-title">Panel Admin</h1>
      <p class="admin-subtitle">Sistem Pengelolaan E-Modul</p>
    </div>
  </div>

  <div class="container" style="padding-bottom:90px;">
    
    <!-- STATS -->
    <div class="stats-grid anim-fade-in-up delay-100">
      <div class="stat-card">
        <span class="stat-card-val">5</span>
        <span class="stat-card-lbl">Modul</span>
      </div>
      <div class="stat-card">
        <span class="stat-card-val" style="color:var(--primary);">3</span>
        <span class="stat-card-lbl">Tutor</span>
      </div>
      <div class="stat-card">
        <span class="stat-card-val" style="color:var(--accent-600);">120</span>
        <span class="stat-card-lbl">Siswa</span>
      </div>
    </div>

    <!-- MODULE MANAGEMENT -->
    <div class="sec-title anim-fade-in-up delay-200">
      <span>⚙️ Kelola Modul</span>
      <button class="btn btn-sm btn-outline">+ Tambah</button>
    </div>
    <div class="mod-grid anim-fade-in-up delay-200">
      
      <div class="mod-card">
        <div class="mod-icon" style="background:#DBEAFE;color:#1D4ED8;">📖</div>
        <div class="mod-info">
          <div class="mod-title">Unit 1: Vocabulary</div>
          <div class="mod-meta">Terakhir edit: 12 Ags</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="mod-card">
        <div class="mod-icon" style="background:#FEF3C7;color:#B45309;">🎙️</div>
        <div class="mod-info">
          <div class="mod-title">Unit 2: Speaking</div>
          <div class="mod-meta">Terakhir edit: 14 Ags</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="mod-card" style="opacity:0.7;">
        <div class="mod-icon" style="background:#F3F4F6;color:#6B7280;">📝</div>
        <div class="mod-info">
          <div class="mod-title">Unit 4: Writing</div>
          <div class="mod-meta">Draft (Belum Rilis)</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>

    </div>

    <!-- SYSTEM REPORT -->
    <div class="sec-title anim-fade-in-up delay-300">
      <span>📈 Laporan Aktivitas</span>
    </div>
    <div class="report-card anim-fade-in-up delay-300">
      <p style="font-size:var(--font-size-xs);color:var(--text-muted);">
        Total Akses Siswa (7 Hari Terakhir)
      </p>
      
      <!-- Lightweight SVG Chart -->
      <div class="chart-container">
        <svg class="chart-svg" viewBox="0 0 100 40" preserveAspectRatio="none">
          <path class="chart-area" d="M0,40 L0,30 L20,15 L40,25 L60,10 L80,20 L100,5 L100,40 Z"></path>
          <path class="chart-line" d="M0,30 L20,15 L40,25 L60,10 L80,20 L100,5"></path>
          <circle class="chart-point" cx="0" cy="30" r="1.5" />
          <circle class="chart-point" cx="20" cy="15" r="1.5" />
          <circle class="chart-point" cx="40" cy="25" r="1.5" />
          <circle class="chart-point" cx="60" cy="10" r="1.5" />
          <circle class="chart-point" cx="80" cy="20" r="1.5" />
          <circle class="chart-point" cx="100" cy="5" r="1.5" />
        </svg>
      </div>
      <div class="chart-labels">
        <span>Sen</span><span>Sel</span><span>Rab</span><span>Kam</span><span>Jum</span><span>Sab</span>
      </div>
    </div>

  </div>

</body>
</html>
