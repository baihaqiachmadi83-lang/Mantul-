  <style>
    body { background: var(--surface); }

    /* ── SESSION TABS ── */
    .sess-tabs {
      display: flex; gap: var(--space-2); overflow-x: auto;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
      padding-bottom: var(--space-1); margin-bottom: var(--space-4);
    }
    .sess-tabs::-webkit-scrollbar { display: none; }
    .sess-tab {
      display: inline-flex; align-items: center; gap: 6px;
      padding: var(--space-2) var(--space-3); border-radius: var(--radius-full);
      font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold);
      border: 1.5px solid var(--border); background: var(--card);
      color: var(--text-muted); white-space: nowrap; flex-shrink: 0;
      transition: all var(--transition-fast); cursor: pointer;
    }
    .sess-tab.active { background: #DC2626; border-color: #DC2626; color: white; }
    .sess-tab.done   { background: #FEF2F2; border-color: #EF4444; color: #B91C1C; }

    /* ── HERO CARD ── */
    .sess-hero {
      border-radius: var(--radius-2xl); padding: var(--space-5) var(--space-6);
      color: white; position: relative; overflow: hidden; margin-bottom: var(--space-4);
      background: linear-gradient(135deg, #DC2626, #7F1D1D);
    }
    .sess-hero-deco {
      position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
      font-size: 5rem; opacity: .15; pointer-events: none; line-height: 1;
    }

    /* ── PROGRESS STRIP ── */
    .phase-strip { display: flex; align-items: center; gap: 0; }
    .phase-node { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .phase-dot {
      width: 30px; height: 30px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 13px;
      font-weight: 700; transition: all var(--transition-base);
      border: 2px solid transparent; background: var(--surface-2); color: var(--text-faint);
    }
    .phase-dot.done { background: #EF4444; color: white; border-color: #EF4444; }
    .phase-dot.active { background: #DC2626; color: white; box-shadow: 0 0 0 4px #FCA5A5; }
    
    .phase-line { flex: 1; height: 2px; background: var(--border); margin: 0 -4px;
      position: relative; top: -10px; transition: background var(--transition-base); }
    .phase-line.done { background: #EF4444; }

    /* ── RESULT BARS ── */
    .skill-res-card {
      background: white; border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: var(--space-4); margin-bottom: var(--space-3);
      display: flex; align-items: center; gap: var(--space-4);
    }
    .skill-res-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }
    .skill-res-body { flex: 1; }
    
    .sr-vocab { background: #DBEAFE; color: #1D4ED8; }
    .sr-speak { background: #FEF3C7; color: #B45309; }
    .sr-read  { background: #D1FAE5; color: #047857; }

    /* ── ACTIVITY TAG ── */
    .act-tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px var(--space-2); border-radius: var(--radius-full);
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .07em; margin-bottom: var(--space-3);
      background: #FEE2E2; color: #991B1B;
    }

    /* TTS Button Mini */
    .btn-tts-mini {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 50%;
      background: #FEE2E2; color: #DC2626; border: none;
      font-size: 1.2rem; cursor: pointer; transition: all .2s;
    }
    .btn-tts-mini.playing { animation: pulsePlay 1s infinite; background: #DC2626; color: white; }
    @keyframes pulsePlay {
      0% { box-shadow: 0 0 0 0 rgba(220,38,38,.4); }
      70% { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
      100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
    }

    .read-box {
      background: var(--surface-2); padding: var(--space-4); border-radius: var(--radius-md);
      margin-bottom: var(--space-4); font-size: var(--font-size-sm); color: var(--text-body);
      border-left: 4px solid var(--accent);
    }
  </style>
</head>

        },
        {

          readingText: '<b>Product:</b><br>Best before: 10 March',
          text: '"Best before: 10 March" menunjukkan tanggal...',

          correct: 1, whyCorrect: '"Best before" adalah batas waktu terbaik untuk dikonsumsi.',
          whyWrong: ['Bukan tanggal produksi.', null, 'Bukan tanggal pembelian.', 'Bukan tanggal pengiriman.']
        },
        {

          correct: 1, whyCorrect: 'Membantu dokter dan merawat pasien adalah tugas perawat (nurse).',
          whyWrong: ['Dia membantu dokter, bukan dokter.', null, 'Bukan guru.', 'Bukan petani.']
        },
        {
          id: 'ft_r17',
          readingText: '<b>Sign at the market:</b><br>Fresh fish sold here.',
          text: 'Berdasarkan tanda, di tempat ini dijual...',

          correct: 1, whyCorrect: '"Fresh fish sold here" artinya menjual ikan segar.',

  ];

  /* ════════════════════════════════════════════════════════
     2. APP STATE & CONFIG
     ════════════════════════════════════════════════════════ */
  const App = {
    sess: 0, // 0=Vocab, 1=Speak, 2=Read, 3=Result
    qi: 0,
    xp: 0,
    scores: [0, 0, 0], // Store score per section
    quizSess: null,

    init(){
      this._loadXP();
      FeedbackEngine.init({
        onNext:  () => this._nextQuestion(),
        onRetry: () => this._retryQuestion(),
        onSkip:  () => this._nextQuestion(),
      });
      if('speechSynthesis' in window) window.speechSynthesis.getVoices();
      this.render();
    },

    goTo(n) {
      if (n >= 0 && n <= 3) {
        FeedbackEngine.dismiss();
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        this.sess = n;
        this.qi = 0;
        this.quizSess = null;
        this.render();
      }
    },

    render(){
      this._updateTabs();
      this._updateHeroBar();

      if(this.sess === 3) {
        this._renderResultPage();
        return;
      }

      if(!this.quizSess) {
        this.quizSess = QuizStore.startSession(`final_${TEST_DATA[this.sess].id}`);
      }

      const currentSection = TEST_DATA[this.sess];
      if(this.qi >= currentSection.questions.length){
        const res = QuizStore.finishSession(this.quizSess, currentSection.questions.length);
        this.scores[this.sess] = Math.round(res.score); // save percentage score
        this.quizSess = null;
        this.sess++;
        this.qi = 0;
        this.render();
        return;
      }

      this._renderQuestion();
    },

    _updateTabs(){
      const container = document.getElementById('sess-tabs-container');
      let html = '';
      TEST_DATA.forEach((s, i) => {
        const isDone = i < this.sess;
        const isAct = i === this.sess;
        
        let cls = 'sess-tab';
        if(isAct) cls += ' active';
        else if(isDone) cls += ' done';
        
        html += `<button class="${cls}" onclick="App.goTo(${i})">${s.emoji} ${s.title}</button>`;
      });
      if(this.sess === 3) {
        html += `<button class="sess-tab active">🏆 Hasil</button>`;
      }
      container.innerHTML = html;
    },

    _updateHeroBar(){
      let totalQ = 0, answered = 0;
      TEST_DATA.forEach((s, i) => {
        totalQ += s.questions.length;
        if(i < this.sess) answered += s.questions.length;
        else if(i === this.sess) answered += this.qi;
      });
      const pct = Math.round((answered / totalQ) * 100);
      const pb = document.getElementById('hero-bar');
      if(pb) pb.style.width = `${pct}%`;
    },

    _renderQuestion(){
      const s = TEST_DATA[this.sess];
      const q = s.questions[this.qi];
      const keys = ['A','B','C','D'];

      let readBoxHtml = '';
      if(q.readingText){
        readBoxHtml = `<div class="read-box">${q.readingText}</div>`;
      }
      
      let audioHtml = '';
      if(q.audioText){
        audioHtml = `
          <div style="text-align:center;margin-bottom:var(--space-3);">
            <button class="btn-tts-mini" id="btn-audio" onclick="App._playAudio('${q.audioText.replace(/'/g,"\\'")}')">🔊</button>
          </div>
        `;
      }

      document.getElementById('activity-area').innerHTML = `
        <div style="display:flex;justify-content:space-between;margin-bottom:var(--space-3);align-items:center;">
          <span class="act-tag">${s.emoji} Bagian ${this.sess+1}: ${s.title}</span>
          <span style="font-size:var(--font-size-xs);color:var(--text-muted);font-weight:700;">Soal ${this.qi+1} / ${s.questions.length}</span>
        </div>
        
        <div class="card" style="padding:var(--space-5);">
          ${readBoxHtml}
          ${audioHtml}
          
          <p style="font-weight:700;font-size:var(--font-size-lg);margin-bottom:var(--space-4);text-align:center;line-height:1.4;">
            ${q.text}
          </p>

          <div style="display:flex;flex-direction:column;gap:var(--space-2);" id="quiz-opts">
            ${q.options.map((opt, i) => `
              <button class="quiz-option" onclick="App._handleAns(${i})" aria-label="${opt}">
                <span class="quiz-option-key">${keys[i]}</span>
                <span class="quiz-option-text">${opt}</span>
              </button>
            `).join('')}
          </div>
          
          <div style="display:flex;justify-content:flex-end;margin-top:var(--space-4);">
            <button class="btn btn-outline" style="border-radius:var(--radius-full);font-size:var(--font-size-sm);" onclick="App._skipQuestion()">
              Lewati / Next ➔
            </button>
          </div>
        </div>
      `;

      // Auto play audio if exists
      if(q.audioText) {
        setTimeout(() => this._playAudio(q.audioText), 500);
      }
    },

    _handleAns(sel){
      const s = TEST_DATA[this.sess];
      const q = s.questions[this.qi];
      const ok = sel === q.correct;

      document.querySelectorAll('.quiz-option').forEach((btn, i) => {
        btn.classList.add('quiz-option--disabled');
        if(i === q.correct) btn.classList.add('quiz-option--correct');
        else if(i === sel && !ok) btn.classList.add('quiz-option--wrong');
      });

      QuizStore.recordAnswer(this.quizSess, q.id, ok, 0, sel);
      if(ok){
        this._addXP(25);
        FeedbackEngine.showCorrect(q, sel);
      } else {
        FeedbackEngine.showWrong(q, sel);
      }
    },

    _nextQuestion(){
      this.qi++;
      this.render();
    },

    _skipQuestion(){
      FeedbackEngine.dismiss();
      const s = TEST_DATA[this.sess];
      const q = s.questions[this.qi];
      QuizStore.recordAnswer(this.quizSess, q.id, false, 0, -1);
      this._nextQuestion();
    },

    _retryQuestion(){
      document.querySelectorAll('.quiz-option').forEach(btn => {
        btn.classList.remove('quiz-option--disabled','quiz-option--wrong','quiz-option--correct');
      });
    },

    _playAudio(text){
      if(!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const btn = document.getElementById('btn-audio');
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      if(btn){
        utterance.onstart = () => btn.classList.add('playing');
        utterance.onend = () => btn.classList.remove('playing');
        utterance.onerror = () => btn.classList.remove('playing');
      }
      window.speechSynthesis.speak(utterance);
    },

    /* ── RESULT PAGE ── */
    _renderResultPage(){
      // Calculate total average
      const avgScore = Math.round(this.scores.reduce((a,b)=>a+b, 0) / 3);
      
      // Update global state
      try {
        const raw = localStorage.getItem('emodul_state');
        if(raw){
          const state = JSON.parse(raw);
          const u = (state.units||[]).find(u=>u.id===4);
          if(u){
            u.progress = Math.max(u.progress||0, avgScore);
            if(avgScore >= 60) u.status = 'done';
            localStorage.setItem('emodul_state', JSON.stringify(state));
          }
        }
      } catch{}

      let html = `
        <div class="card" style="padding:var(--space-6);text-align:center;border:2px solid var(--accent);margin-bottom:var(--space-5);">
          <div style="font-size:3.5rem;animation:badgeBounce .6s ease both;margin-bottom:var(--space-3);" aria-hidden="true">🎓</div>
          <h2 style="font-size:var(--font-size-2xl);font-weight:800;color:var(--accent-700);margin-bottom:var(--space-2);">
            Ujian Selesai!
          </h2>
          <p style="color:var(--text-body);margin-bottom:var(--space-3);line-height:1.5;">
            Selamat, Anda telah menyelesaikan seluruh rangkaian evaluasi. Berikut adalah ringkasan kemampuan Anda:
          </p>
          <div style="font-size:var(--font-size-2xl);font-weight:900;color:var(--primary);margin-bottom:var(--space-4);">
            Nilai Akhir: ${avgScore}%
          </div>
        </div>
        
        <h3 style="font-size:var(--font-size-sm);font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text-faint);margin-bottom:var(--space-3);">
          Rincian Kompetensi
        </h3>
      `;

      TEST_DATA.forEach((s, i) => {
        const sc = this.scores[i];
        let msg = sc >= 80 ? 'Sangat Baik' : sc >= 60 ? 'Cukup Baik' : 'Perlu Latihan Lagi';
        
        html += `
          <div class="skill-res-card">
            <div class="skill-res-icon ${s.themeClass}">${s.emoji}</div>
            <div class="skill-res-body">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                <span style="font-weight:700;">${s.title}</span>
                <span style="font-weight:800;color:var(--text-main);">${sc}%</span>
              </div>
              <div class="progress-bar-track progress-bar-track--thin" style="margin-bottom:6px;">
                <div class="progress-bar-fill" style="width:${sc}%; background:var(--primary);"></div>
              </div>
              <p style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;">${msg}</p>
            </div>
          </div>
        `;
      });

      html += `
        <div style="margin-top:var(--space-5);display:flex;flex-direction:column;gap:var(--space-3);">
          <a href="index.html" class="btn btn-primary btn-block">Kembali ke Beranda 🏠</a>
          <button class="btn btn-outline btn-block" onclick="location.reload()">Ulangi Final Test ↺</button>
        </div>
      `;

      document.getElementById('activity-area').innerHTML = html;
      
      if(avgScore >= 60 && typeof Utils !== 'undefined') Utils.showConfetti?.();
    },

    _addXP(n){
      this.xp += n;
      try{ localStorage.setItem('emodul_final_xp', this.xp); }catch{}
      const el = document.getElementById('nav-xp');
      if(el){
        el.textContent = `${this.xp} XP`;
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = 'heartbeat .4s ease both';
      }
    },
    _loadXP(){
      try{ this.xp = parseInt(localStorage.getItem('emodul_final_xp')||'0',10)||0; }catch{}
    }
  };

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', ()=>App.init());
  } else {
    App.init();
  }
  </script>
</body>
